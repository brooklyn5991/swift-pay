<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SwiftPay | Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; height: 100vh; }
        .register-card { width: 100%; max-width: 500px; padding: 30px; margin: auto; border-radius: 15px; }
        .btn-primary { background-color: #007bff; border: none; }
        .btn-primary:hover { background-color: #0056b3; }
    </style>
</head>
<body>

	<div class="card register-card shadow">
	    <h2 class="text-center text-primary mb-2">SwiftPay</h2>
	    <p class="text-center text-muted mb-4">Join our secure fintech network</p>

	    <form method="POST" th:action="@{/register}" th:object="${registrationForm}" id="registerForm">
	        
	        <div class="mb-3">
	            <label class="form-label">Username</label>
	            <input type="text" th:field="*{username}" class="form-control" placeholder="Choose a unique username" />
	            <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger small"></div>
	        </div>

	        <div class="mb-3">
	            <label class="form-label">Password</label>
	            <input type="password" th:field="*{password}" class="form-control" placeholder="Create a strong password" />
	            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small"></div>
	        </div>

	        <div class="mb-3">
	            <label class="form-label">Full Name</label>
	            <input type="text" th:field="*{fullname}" class="form-control" placeholder="Enter your full legal name" />
	        </div>

	        <div class="mb-3">
	            <label class="form-label">Phone Number</label>
	            <input type="text" th:field="*{phoneNumber}" class="form-control" placeholder="e.g., +234..." />
	        </div>

	        <div class="d-grid gap-2 mt-4">
	            <button type="submit" class="btn btn-primary btn-lg">Register</button>
	        </div>

	        <p class="mt-3 text-center">
	            Already have an account? <a th:href="@{/login}">Login here</a>
	        </p>
	    </form>
	</div>
</body>
</html>
