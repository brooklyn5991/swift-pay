<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SwiftPay | Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .login-card h2 { color: #007bff; margin-bottom: 20px; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .login-btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="login-card">
        <img th:src="@{/images/swiftlogo.png}" width="50" alt="Logo">
        <h2>Login to SwiftPay</h2>
        <form>
            <input type="text" placeholder="Username or Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
        <p style="font-size: 0.8em; margin-top: 15px;"><a href="/">Back to Home</a></p>
    </div>
</body>
</html>
