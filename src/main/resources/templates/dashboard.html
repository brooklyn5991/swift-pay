<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SwiftPay | Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; }
        .sidebar { width: 250px; height: 100vh; background: #007bff; color: white; position: fixed; padding: 20px; }
        .main-content { margin-left: 290px; padding: 40px; }
        .card { background: white; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); display: inline-block; min-width: 300px; }
        .btn-action { display: inline-block; background: #28a745; color: white; padding: 15px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>SwiftPay</h2>
        <p>Welcome, User!</p>
        <hr>
        <p><a href="/" style="color: white;">Logout</a></p>
    </div>

    <div class="main-content">
        <h1>Account Overview</h1>
        <div class="card">
            <h3>Available Balance</h3>
            <h2 text="${balance}" style="color: #28a745;">5000</h2>
        </div>
        <br>
		
		<a th:href="@{/transfer}" class="btn-action">Send Money Now</a>
		<a th:href="@{/currencies}"  class="btn-action">Check Other Currencies</a>
        
    </div>
</body>
</html>
