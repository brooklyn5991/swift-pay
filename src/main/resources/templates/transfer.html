<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SwiftPay | Send Money</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .transfer-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 400px; }
        .transfer-card h2 { color: #007bff; text-align: center; margin-top: 0; margin-bottom: 25px; }
        .transfer-card label { display: block; margin-top: 15px; font-weight: bold; color: #555; font-size: 0.9em; }
        .transfer-card input, .transfer-card textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; transition: border-color 0.3s; }
        .transfer-card input:focus { border-color: #007bff; outline: none; }
        .send-btn { width: 100%; padding: 14px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 25px; transition: background 0.3s; }
        .send-btn:hover { background-color: #218838; }
        .back-link { display: block; text-align: center; margin-top: 20px; font-size: 0.9em; color: #888; text-decoration: none; }
        .back-link:hover { color: #007bff; }
        .validationError { color: #dc3545; font-size: 0.8em; margin-top: -5px; display: block; }
        .alert-danger { background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; font-size: 0.9em; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="transfer-card">
        <div style="text-align: center; margin-bottom: 15px;">
            <img th:src="@{/images/swiftlogo.png}" width="50" alt="SwiftPay Logo">
        </div>
        <h2>Send Money</h2>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form method="POST" th:action="@{/transfer}" th:object="${transaction}">
            
            <label>Receiver Username</label>
            <input type="text" th:field="*{receiver.username}" placeholder="Enter recipient username" />
            <span class="validationError"
                  th:if="${#fields.hasErrors('receiver.username')}"
                  th:errors="*{receiver.username}">Recipient error</span>

            <label>Amount (₦)</label>
            <input type="number" step="0.01" th:field="*{amount}" placeholder="0.00" />
            <span class="validationError"
                  th:if="${#fields.hasErrors('amount')}"
                  th:errors="*{amount}">Amount error</span>

            <label>Remarks (Optional)</label>
            <textarea th:field="*{remarks}" rows="2" placeholder="What's this for?"></textarea>

            <button type="submit" class="send-btn">Confirm Transfer</button>
        </form>

        <a th:href="@{/dashboard}" class="back-link">Cancel and go back</a>
    </div>
</body>
</html>
