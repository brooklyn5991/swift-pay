<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SwiftPay | Send Money</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .transfer-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 400px; }
        .transfer-card h2 { color: #007bff; text-align: center; margin-top: 0; }
        .transfer-card label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        .transfer-card input, .transfer-card textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .send-btn { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 20px; }
        .send-btn:hover { background-color: #218838; }
        .back-link { display: block; text-align: center; margin-top: 15px; font-size: 0.9em; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="transfer-card">
        <div style="text-align: center; margin-bottom: 10px;">
            <img th:src="@{/images/swiftlogo.png}" width="40" alt="Logo">
        </div>
        <h2>Send Money</h2>

        <form method="POST" th:action="@{/transfer}" th:object="${transaction}">
            
            <label>Receiver Account ID</label>
            <input type="text" th:field="*{receiverId}" placeholder="e.g. ACC-123456" />

            <label>Amount ($)</label>
            <input type="number" step="0.01" th:field="*{amount}" placeholder="0.00" />

            <label>Remarks (Optional)</label>
            <textarea th:field="*{remarks}" rows="2" placeholder="What is this for?"></textarea>

            <button type="submit" class="send-btn">Confirm Transfer</button>
        </form>

        <a th:href="@{/dashboard}" class="back-link">Cancel and go back</a>
    </div>
</body>
</html>
